<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
<style>
  :root {
    --rose: #e8647a;
    --blush: #f7c5cc;
    --cream: #fff8f4;
    --gold: #d4a84b;
    --deep: #2c1a1a;
    --soft: #f0e4e0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--cream);
    color: var(--deep);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── PARTICLES ── */
  #particles {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: float linear infinite;
  }
  @keyframes float {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10%  { opacity: .6; }
    90%  { opacity: .4; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  /* ── COUNTDOWN PAGE ── */
  #countdown-page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  .crown {
    font-size: 4rem;
    animation: bob 2s ease-in-out infinite;
    margin-bottom: .5rem;
    display: block;
  }
  @keyframes bob {
    0%,100% { transform: translateY(0) rotate(-5deg); }
    50%      { transform: translateY(-12px) rotate(5deg); }
  }

  .countdown-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 4.5rem);
    font-weight: 700;
    color: var(--rose);
    line-height: 1.1;
    margin-bottom: .4rem;
  }
  .countdown-sub {
    font-size: 1.1rem;
    font-weight: 300;
    color: #9e6e72;
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  .timer {
    display: flex; gap: clamp(.8rem, 3vw, 2.5rem);
    flex-wrap: wrap; justify-content: center;
    margin-bottom: 3rem;
  }
  .unit {
    background: white;
    border-radius: 18px;
    padding: 1.4rem 1.8rem;
    box-shadow: 0 6px 30px rgba(232,100,122,.15);
    min-width: 90px;
    position: relative;
    overflow: hidden;
  }
  .unit::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--rose), var(--gold));
  }
  .unit-num {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 5vw, 3.5rem);
    font-weight: 700;
    color: var(--rose);
    line-height: 1;
    display: block;
  }
  .unit-label {
    font-size: .7rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: #b08080;
    margin-top: .3rem;
    display: block;
  }

  .heartline {
    display: flex; align-items: center; gap: 1rem;
    color: #c8a0a4; font-size: .85rem; letter-spacing: .12em;
    text-transform: uppercase;
  }
  .heartline::before, .heartline::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--blush));
  }
  .heartline::after { background: linear-gradient(90deg, var(--blush), transparent); }

  /* ── BIRTHDAY PAGE ── */
  #birthday-page {
    display: none;
    position: relative; z-index: 1;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .bday-header {
    text-align: center;
    padding: 3rem 1rem 2.5rem;
    position: relative;
  }
  .bday-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 7vw, 5rem);
    color: var(--rose);
    line-height: 1;
  }
  .bday-header h1 em {
    font-style: italic;
    color: var(--gold);
  }
  .bday-header p {
    margin-top: .8rem;
    font-size: 1.05rem;
    font-weight: 300;
    color: #9e6e72;
    letter-spacing: .1em;
  }

  .instruction {
    text-align: center;
    font-size: .85rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #b08080;
    margin-bottom: 2.5rem;
  }

  /* ── CARD GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1.4rem;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 .5rem;
  }

  .card-wrapper {
    aspect-ratio: 3/4;
    perspective: 900px;
    cursor: pointer;
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .65s cubic-bezier(.4,.2,.2,1);
    border-radius: 16px;
  }
  .card-wrapper.flipped .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    border-radius: 16px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  /* FRONT */
  .card-front {
    background: var(--soft);
    box-shadow: 0 8px 28px rgba(232,100,122,.18);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: .6rem;
    border: 2px solid rgba(232,100,122,.12);
  }
  .card-front img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 14px;
  }
  .card-num-badge {
    position: absolute; top: 10px; right: 12px;
    background: var(--rose);
    color: white;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
    z-index: 2;
  }
  /* placeholder gradient when no image */
  .card-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: .5rem;
    font-size: 2.2rem;
  }

  /* BACK */
  .card-back {
    transform: rotateY(180deg);
    background: linear-gradient(145deg, #fff0f3, #fff8f4);
    box-shadow: 0 8px 28px rgba(232,100,122,.22);
    padding: 1.4rem 1.2rem;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    border: 2px solid rgba(232,100,122,.2);
  }
  .card-back .back-num {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: var(--rose);
    line-height: 1;
    margin-bottom: .5rem;
  }
  .card-back .divider {
    width: 36px; height: 2px;
    background: linear-gradient(90deg, var(--rose), var(--gold));
    border-radius: 2px;
    margin-bottom: .7rem;
  }
  .card-back p {
    font-size: .85rem;
    line-height: 1.6;
    color: #5a3535;
    font-weight: 400;
  }

  /* ── CONFETTI ── */
  #confetti-canvas {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 999;
  }

  /* ── DEV TOGGLE ── */
  #dev-toggle {
    position: fixed; bottom: 1.2rem; right: 1.2rem; z-index: 9999;
    background: var(--deep); color: white;
    border: none; border-radius: 999px;
    padding: .55rem 1.1rem;
    font-family: 'Lato', sans-serif; font-size: .75rem;
    letter-spacing: .1em; text-transform: uppercase;
    cursor: pointer; opacity: .7;
    box-shadow: 0 4px 14px rgba(0,0,0,.25);
    transition: opacity .2s;
  }
  #dev-toggle:hover { opacity: 1; }

  /* ── FADE IN ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card-wrapper {
    opacity: 0;
    animation: fadeUp .5s ease forwards;
  }

</style>
</head>
<body>

<button id="dev-toggle" onclick="devToggle()">🔀 Preview other page</button>
<div id="particles"></div>
<canvas id="confetti-canvas"></canvas>

<!-- ═══════════ COUNTDOWN PAGE ═══════════ -->
<div id="countdown-page">
  <span class="crown">👑</span>
  <h1 class="countdown-title">Something beautiful<br/>is coming…</h1>
  <p class="countdown-sub">A little surprise, just for you</p>

  <div class="timer">
    <div class="unit"><span class="unit-num" id="d">00</span><span class="unit-label">Days</span></div>
    <div class="unit"><span class="unit-num" id="h">00</span><span class="unit-label">Hours</span></div>
    <div class="unit"><span class="unit-num" id="m">00</span><span class="unit-label">Minutes</span></div>
    <div class="unit"><span class="unit-num" id="s">00</span><span class="unit-label">Seconds</span></div>
  </div>

  <div class="heartline">✦ &nbsp; May 3rd &nbsp; ✦</div>
</div>

<!-- ═══════════ BIRTHDAY PAGE ═══════════ -->
<div id="birthday-page">
  <div class="bday-header">
    <h1>Happy Birthday,<br/><em>my love ✨</em></h1>
    <p>24 reasons I adore you &mdash; flip every card to reveal them</p>
  </div>
  <p class="instruction">🖱 tap a card to flip it open</p>
  <div class="grid" id="grid"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// ✏️  EDIT THIS SECTION TO PERSONALISE
// ═══════════════════════════════════════════════

// Birthday date/time (local time)
const BIRTHDAY = new Date('2026-05-03T00:00:00');

// 24 messages — one per card
// Replace these with your own words!
const MESSAGES = [
  "The way your eyes light up when you laugh — it's my favourite sight in the world.",
  "You make even the most ordinary Tuesday feel like an adventure.",
  "Your kindness is quiet and endless. I notice every little act.",
  "The way you hum to yourself when you cook. I could listen forever.",
  "You always know exactly what I need before I even say it.",
  "24 years of you existing in this world — what a gift to everyone who knows you.",
  "The way you care for the people you love is extraordinary.",
  "I love that you have strong opinions about breakfast foods. Don't ever change.",
  "You are so much braver than you give yourself credit for.",
  "Every trip we take with you at my side becomes a story I'll tell forever.",
  "You make me want to be a better person, every single day.",
  "The sound of your laugh is genuinely my favourite noise.",
  "You notice beauty in places other people walk straight past.",
  "You are brilliant — and I love watching the world discover that.",
  "The way you love your family makes me fall for you over and over.",
  "Your taste in music is, objectively, perfect.",
  "You give the warmest hugs. Scientific fact.",
  "I love that you get irrationally passionate about small things. It's endearing.",
  "You are the best decision I ever made.",
  "The world is genuinely more interesting with you in it.",
  "You handle hard days with more grace than you realise.",
  "I'm so proud of everything you've already built — and excited for what comes next.",
  "Every year with you is my favourite year yet.",
  "Here's to 24 more years of adventures, laughter, and growing old together. I love you. ❤️",
];

// Images are loaded from the img/ folder as 1.jpg, 2.jpg, ... 24.jpg
// If a file doesn't exist yet, a pretty placeholder is shown automatically.

// Emoji used on placeholder cards (cycles through)
const EMOJIS = ['🌸','🌺','🌹','💐','🌷','✨','🦋','🍓','🌙','⭐','🎀','💌','🌈','🍰','🫶','💫','🌸','🌻','🎁','🍒','💕','🌟','🎶','🩷'];

// ═══════════════════════════════════════════════
// END OF EDITABLE SECTION
// ═══════════════════════════════════════════════

// ── Floating particles ──
const particleContainer = document.getElementById('particles');
const colors = ['#e8647a','#f7c5cc','#d4a84b','#f0c8b0','#c8a0d8'];
for (let i = 0; i < 28; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = 6 + Math.random() * 14;
  p.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    animation-duration:${8+Math.random()*12}s;
    animation-delay:${Math.random()*10}s;
  `;
  particleContainer.appendChild(p);
}

// ── Build card grid ──
function buildGrid() {
  const grid = document.getElementById('grid');
  MESSAGES.forEach((msg, i) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'card-wrapper';
    wrapper.style.animationDelay = `${i * 0.07}s`;

    const inner = document.createElement('div');
    inner.className = 'card-inner';

    // Front
    const front = document.createElement('div');
    front.className = 'card-face card-front';

    const ph = document.createElement('div');
    ph.className = 'card-placeholder';
    ph.style.background = `linear-gradient(135deg, hsl(${340 + i*5},80%,94%), hsl(${20 + i*4},90%,92%))`;
    ph.innerHTML = `<span>${EMOJIS[i]}</span>`;

    const img = document.createElement('img');
    img.alt = `Memory ${i+1}`;
    img.src = `img/${i+1}.jpg`;
    img.style.display = 'none';
    img.onload = () => { img.style.display = 'block'; ph.style.display = 'none'; };
    img.onerror = () => { img.style.display = 'none'; ph.style.display = 'flex'; };

    front.appendChild(ph);
    front.appendChild(img);
    const badge = document.createElement('div');
    badge.className = 'card-num-badge';
    badge.textContent = i + 1;
    front.appendChild(badge);

    // Back
    const back = document.createElement('div');
    back.className = 'card-face card-back';
    back.innerHTML = `
      <div class="back-num">${i + 1}</div>
      <div class="divider"></div>
      <p>${msg}</p>
    `;

    inner.appendChild(front);
    inner.appendChild(back);
    wrapper.appendChild(inner);

    wrapper.addEventListener('click', () => wrapper.classList.toggle('flipped'));
    grid.appendChild(wrapper);
  });
}

// ── Confetti ──
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let confettiBits = [];
let confettiRunning = false;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function spawnConfetti() {
  const confColors = ['#e8647a','#f7c5cc','#d4a84b','#a8d8ea','#c8b6e2','#f9e04b'];
  for (let i = 0; i < 160; i++) {
    confettiBits.push({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * 200,
      w: 6 + Math.random() * 8,
      h: 4 + Math.random() * 6,
      color: confColors[Math.floor(Math.random()*confColors.length)],
      vy: 2 + Math.random() * 4,
      vx: -2 + Math.random() * 4,
      rot: Math.random() * 360,
      rotV: -3 + Math.random() * 6,
      opacity: 1,
    });
  }
}

function animateConfetti() {
  if (!confettiRunning) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  confettiBits.forEach(b => {
    b.y += b.vy; b.x += b.vx; b.rot += b.rotV;
    if (b.y > canvas.height) b.opacity -= .03;
    ctx.save();
    ctx.globalAlpha = Math.max(0, b.opacity);
    ctx.translate(b.x, b.y);
    ctx.rotate(b.rot * Math.PI / 180);
    ctx.fillStyle = b.color;
    ctx.fillRect(-b.w/2, -b.h/2, b.w, b.h);
    ctx.restore();
  });
  confettiBits = confettiBits.filter(b => b.opacity > 0);
  if (confettiBits.length > 0) requestAnimationFrame(animateConfetti);
  else confettiRunning = false;
}

function launchConfetti() {
  confettiRunning = true;
  spawnConfetti();
  setTimeout(spawnConfetti, 700);
  setTimeout(spawnConfetti, 1400);
  animateConfetti();
}

// ── Switch pages ──
function showBirthdayPage() {
  document.getElementById('countdown-page').style.display = 'none';
  const bp = document.getElementById('birthday-page');
  bp.style.display = 'block';
  buildGrid();
  launchConfetti();
  // re-launch confetti every 8s for fun
  setInterval(launchConfetti, 8000);
}

// ── Countdown ticker ──
function pad(n) { return String(n).padStart(2, '0'); }

function tick() {
  const now = new Date();
  const diff = BIRTHDAY - now;

  if (diff <= 0) {
    showBirthdayPage();
    return;
  }

  const days    = Math.floor(diff / 86400000);
  const hours   = Math.floor((diff % 86400000) / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  const seconds = Math.floor((diff % 60000) / 1000);

  document.getElementById('d').textContent = pad(days);
  document.getElementById('h').textContent = pad(hours);
  document.getElementById('m').textContent = pad(minutes);
  document.getElementById('s').textContent = pad(seconds);
}

// ── Dev toggle ──
let onBirthdayPage = false;
function devToggle() {
  if (!onBirthdayPage) {
    showBirthdayPage();
    onBirthdayPage = true;
    document.getElementById('dev-toggle').textContent = '🔀 Preview countdown';
  } else {
    document.getElementById('birthday-page').style.display = 'none';
    document.getElementById('countdown-page').style.display = 'flex';
    onBirthdayPage = false;
    document.getElementById('dev-toggle').textContent = '🔀 Preview other page';
  }
}

tick();
setInterval(tick, 1000);
</script>
</body>
</html>
